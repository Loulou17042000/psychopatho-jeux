<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<title>Le Spectre — Quiz Chapitre 8</title>
<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f0f1a;

    --correct: #22c55e;
    --wrong: #ef4444;
    --border: #2a2a40;
  }

  #app {
    max-width: 780px;
    width: 100%;
  }

  .start-screen {
    text-align: center;
    padding: 4rem 2rem;
    animation: fadeIn .6s ease;
  }
  .start-screen .icon { font-size: 4rem; margin-bottom: 1rem; filter: drop-shadow(0 0 20px var(--accent-glow)); }
  .start-screen h1 {
    font-size: 2.8rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent-light), #fca5a5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -1px;
  }
  .start-screen .subtitle {
    font-size: 1.1rem;
    color: #9ca3af;
    margin: .5rem 0 2.5rem;
    font-weight: 500;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: .5rem;
    padding: .9rem 2.2rem;
    border: none;
    border-radius: 12px;
    font-family: inherit;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 0 25px var(--accent-glow);
  }
  .btn-primary:hover { background: var(--accent-light); transform: translateY(-2px); box-shadow: 0 0 35px var(--accent-glow); }

  .btn-secondary {
    background: var(--bg-card);
    color: #e2e2e8;
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--bg-card-hover); }

  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: .7rem;
    font-size: .9rem;
    color: #9ca3af;
  }
  .score-display { font-weight: 700; color: var(--accent-light); }
  .progress-bar-track {
    width: 100%;
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 1.8rem;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-light));
    border-radius: 99px;
    transition: width .4s ease;
    box-shadow: 0 0 12px var(--accent-glow);
  }

  /* ---- QUESTION CARD ---- */
  .question-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    animation: slideUp .35s ease;
  }
  .question-tag {
    display: inline-block;
    font-size: .72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent-light);
    background: rgba(185,28,28,.15);
    padding: .3rem .75rem;
    border-radius: 6px;
    margin-bottom: 1rem;
  }
  .question-text {
    font-size: 1.15rem;
    font-weight: 600;
    line-height: 1.55;
    margin-bottom: 1.6rem;
  }

  .choices { display: flex; flex-direction: column; gap: .65rem; }
  .choice-btn {
    width: 100%;
    text-align: left;
    padding: 1rem 1.2rem;
    background: #12122a;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: #e2e2e8;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: all .18s;
    line-height: 1.45;
  }
  .choice-btn:hover:not(.disabled) { background: var(--bg-card-hover); border-color: var(--accent); }

  .choice-btn.correct {
    border-color: var(--correct) !important;
    background: rgba(34,197,94,.12) !important;
    color: #bbf7d0;
  }
  .choice-btn.wrong {
    border-color: var(--wrong) !important;
    background: rgba(239,68,68,.1) !important;
    color: #fca5a5;
  }
  .choice-btn.disabled { cursor: default; opacity: .65; }
  .choice-btn.correct.disabled, .choice-btn.wrong.disabled { opacity: 1; }

  /* ---- EXPLANATION ---- */
  .explanation {
    margin-top: 1.4rem;
    padding: 1.1rem 1.3rem;
    background: rgba(185,28,28,.08);
    border-left: 3px solid var(--accent);
    border-radius: 0 10px 10px 0;
    font-size: .92rem;
    line-height: 1.55;
    color: #d1d5db;
    animation: fadeIn .3s ease;
  }
  .explanation strong { color: var(--accent-light); }

  .next-btn-wrap { text-align: center; margin-top: 1.5rem; }

  /* ---- RESULTS ---- */
  .results {
    text-align: center;
    padding: 3rem 2rem;
    animation: fadeIn .6s ease;
  }
  .results .big-score {
    font-size: 5rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent-light), #fca5a5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .results .label { color: #9ca3af; margin-bottom: 2rem; font-size: 1.1rem; }
  .results .message {
    font-size: 1.25rem;
    font-weight: 700;
    margin-bottom: 2.5rem;
    line-height: 1.5;
  }
  .results .btn-group { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }

  /* ---- REVIEW ---- */
  .review-section { margin-top: 2.5rem; text-align: left; }
  .review-section h3 { margin-bottom: 1rem; font-size: 1.15rem; }
  .review-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem;
    margin-bottom: .8rem;
  }
  .review-item.was-correct { border-left: 3px solid var(--correct); }
  .review-item.was-wrong { border-left: 3px solid var(--wrong); }
  .review-q { font-weight: 600; margin-bottom: .4rem; }
  .review-a { font-size: .9rem; color: #9ca3af; }
  .review-a span { color: var(--correct); font-weight: 600; }

  /* ---- ANIMATIONS ---- */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 600px) {
    .start-screen h1 { font-size: 2rem; }
    .question-card { padding: 1.4rem; }
    .question-text { font-size: 1.05rem; }
  }
</style>

// ============================================================
//  GAME ENGINE
// ============================================================
const QUESTIONS_PER_SESSION = 20;
const app = document.getElementById('app');

let sessionQuestions = [];
let currentIndex = 0;
let score = 0;
let answered = false;
let userAnswers = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  sessionQuestions = shuffle(ALL_QUESTIONS).slice(0, QUESTIONS_PER_SESSION);
  currentIndex = 0;
  score = 0;
  userAnswers = [];
  answered = false;
  renderQuestion();
}

function renderStart() {
  app.innerHTML = `
    <div class="start-screen">
      <div class="icon">👻</div>
      <h1>Le Spectre</h1>
      <p class="subtitle">Chapitre 8 : Les Troubles Schizophréniques</p>
      <p style="color:#6b7280;margin-bottom:2rem;font-size:.95rem;">${ALL_QUESTIONS.length} questions en banque — ${QUESTIONS_PER_SESSION} tirées au hasard par session</p>
      <button class="btn btn-primary" onclick="startGame()">Commencer le quiz</button>
    </div>
  `;
}

function renderQuestion() {
  const q = sessionQuestions[currentIndex];
  answered = false;

  // Build choices
  let choices, correctIdx;
  if (q.type === 'vf') {
    choices = ['Vrai', 'Faux'];
    correctIdx = q.answer;
  } else {
    // Shuffle QCM choices
    const indexed = q.choices.map((c, i) => ({ text: c, origIdx: i }));
    const shuffled = shuffle(indexed);
    choices = shuffled.map(c => c.text);
    correctIdx = shuffled.findIndex(c => c.origIdx === q.answer);
  }

  const progress = ((currentIndex) / QUESTIONS_PER_SESSION) * 100;

  app.innerHTML = `
    <div class="quiz-header">
      <span>Question ${currentIndex + 1} / ${QUESTIONS_PER_SESSION}</span>
      <span class="score-display">Score : ${score} / ${currentIndex}</span>
    </div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" style="width:${progress}%"></div>
    </div>
    <div class="question-card">
      <span class="question-tag">${q.tag} — ${q.type === 'vf' ? 'Vrai / Faux' : 'QCM'}</span>
      <div class="question-text">${q.q}</div>
      <div class="choices" id="choices">
        ${choices.map((c, i) => `<button class="choice-btn" data-idx="${i}" onclick="selectAnswer(${i}, ${correctIdx})">${c}</button>`).join('')}
      </div>
      <div id="feedback"></div>
    </div>
  `;

  // Store for review
  window._currentCorrectIdx = correctIdx;
  window._currentChoices = choices;
}

function selectAnswer(selected, correct) {
  if (answered) return;
  answered = true;

  const q = sessionQuestions[currentIndex];
  const btns = document.querySelectorAll('.choice-btn');
  const isCorrect = selected === correct;

  if (isCorrect) score++;

  btns.forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === correct) btn.classList.add('correct');
    if (i === selected && !isCorrect) btn.classList.add('wrong');
  });

  // Update score display
  document.querySelector('.score-display').textContent = `Score : ${score} / ${currentIndex + 1}`;

  userAnswers.push({
    question: q.q,
    correct: isCorrect,
    correctAnswer: window._currentChoices[correct],
    yourAnswer: window._currentChoices[selected]
  });

  const feedback = document.getElementById('feedback');
  feedback.innerHTML = `
    <div class="explanation">
      <strong>${isCorrect ? '✓ Correct !' : '✗ Incorrect.'}</strong> ${q.explanation}
    </div>
    <div class="next-btn-wrap">
      <button class="btn btn-primary" onclick="${currentIndex < QUESTIONS_PER_SESSION - 1 ? 'nextQuestion()' : 'showResults()'}">
        ${currentIndex < QUESTIONS_PER_SESSION - 1 ? 'Question suivante →' : 'Voir les résultats →'}
      </button>
    </div>
  `;
}

function nextQuestion() {
  currentIndex++;
  renderQuestion();
}

function showResults() {
  const pct = Math.round((score / QUESTIONS_PER_SESSION) * 100);
  let msg;
  if (pct >= 90) msg = 'Exceptionnel ! Vous maîtrisez parfaitement le spectre schizophrénique.';
  else if (pct >= 75) msg = 'Très bien ! Quelques détails à revoir, mais solide maîtrise.';
  else if (pct >= 60) msg = 'Pas mal ! Revoyez les points faibles et vous y êtes presque.';
  else if (pct >= 40) msg = 'Des bases présentes, mais il faut approfondir.';
  else msg = 'Il est temps de relire le chapitre 8 en profondeur !';

  const wrongOnes = userAnswers.filter(a => !a.correct);
  const correctOnes = userAnswers.filter(a => a.correct);

  app.innerHTML = `
    <div class="results">
      <div class="big-score">${pct}%</div>
      <div class="label">${score} / ${QUESTIONS_PER_SESSION} bonnes réponses</div>
      <div class="message">${msg}</div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="startGame()">Rejouer</button>
        <button class="btn btn-secondary" onclick="renderStart()">Accueil</button>
      </div>
      ${wrongOnes.length > 0 ? `
      <div class="review-section">
        <h3 style="color:var(--wrong);">Réponses incorrectes (${wrongOnes.length})</h3>
        ${wrongOnes.map(a => `
          <div class="review-item was-wrong">
            <div class="review-q">${a.question}</div>
            <div class="review-a">Votre réponse : ${a.yourAnswer}<br>Réponse correcte : <span>${a.correctAnswer}</span></div>
          </div>
        `).join('')}
      </div>` : ''}
      ${correctOnes.length > 0 ? `
      <div class="review-section">
        <h3 style="color:var(--correct);">Réponses correctes (${correctOnes.length})</h3>
        ${correctOnes.map(a => `
          <div class="review-item was-correct">
            <div class="review-q">${a.question}</div>
            <div class="review-a">Réponse : <span>${a.correctAnswer}</span></div>
          </div>
        `).join('')}
      </div>` : ''}
    </div>
  `;
}

// INIT
renderStart();
</script>
</body>
</html>
