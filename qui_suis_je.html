<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qui suis-je ? - Psychopathologie</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f1117;--card:#1a1d27;--card2:#232635;--accent:#6c63ff;--accent2:#ff6584;
    --green:#2ecc71;--red:#e74c3c;--text:#e0e0e8;--muted:#8888a0;--border:#2a2d3e;
    --radius:12px;
  }
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--bg);color:var(--text);min-height:100vh;
    display:flex;flex-direction:column;align-items:center;
    padding:20px;line-height:1.6;
  }
  h1{font-size:1.8rem;margin-bottom:4px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .subtitle{color:var(--muted);font-size:.9rem;margin-bottom:20px;}
  .container{max-width:700px;width:100%;}

  /* Progress */
  .progress-wrap{width:100%;margin-bottom:18px;}
  .progress-info{display:flex;justify-content:space-between;font-size:.85rem;color:var(--muted);margin-bottom:6px;}
  .progress-bar{height:8px;background:var(--card2);border-radius:99px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .5s ease;}

  /* Score badge */
  .score-badge{
    position:fixed;top:16px;right:20px;background:var(--card);border:1px solid var(--border);
    padding:8px 18px;border-radius:99px;font-weight:600;font-size:.95rem;z-index:10;
  }
  .score-badge span{color:var(--accent);}

  /* Card */
  .case-card{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    padding:28px 32px;margin-bottom:16px;position:relative;overflow:hidden;
  }
  .case-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .patient-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
  .patient-icon{
    width:48px;height:48px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;
  }
  .patient-name{font-size:1.15rem;font-weight:600;}
  .patient-desc{color:var(--muted);font-size:.85rem;}

  /* Clues */
  .clues-list{list-style:none;margin-bottom:20px;}
  .clue-item{
    padding:10px 14px;margin-bottom:8px;background:var(--card2);border-radius:8px;
    border-left:3px solid var(--accent);font-size:.95rem;
    animation:slideIn .4s ease;
  }
  .clue-item .num{color:var(--accent);font-weight:700;margin-right:8px;}
  @keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}

  /* Answer area */
  .answer-area{display:flex;gap:10px;flex-wrap:wrap;align-items:stretch;}
  .answer-area select,.answer-area input{
    flex:1;min-width:180px;padding:10px 14px;border-radius:8px;border:1px solid var(--border);
    background:var(--card2);color:var(--text);font-size:.95rem;outline:none;
    transition:border-color .2s;
  }
  .answer-area select:focus,.answer-area input:focus{border-color:var(--accent);}
  .btn{
    padding:10px 22px;border:none;border-radius:8px;font-size:.95rem;font-weight:600;
    cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;
  }
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{filter:brightness(1.15);transform:translateY(-1px);}
  .btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border);}
  .btn-secondary:hover{border-color:var(--accent);}
  .btn-success{background:var(--green);color:#fff;}
  .btn-danger{background:var(--red);color:#fff;}
  .btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
  .btn-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;}

  /* Feedback */
  .feedback{
    padding:14px 18px;border-radius:8px;margin-top:14px;font-weight:600;
    animation:popIn .35s ease;
  }
  .feedback.correct{background:rgba(46,204,113,.15);border:1px solid var(--green);color:var(--green);}
  .feedback.wrong{background:rgba(231,76,60,.15);border:1px solid var(--red);color:var(--red);}
  @keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}

  /* Confetti */
  .confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;pointer-events:none;z-index:999;animation:confettiFall 1.2s ease forwards;}
  @keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}

  /* Shake */
  .shake{animation:shake .4s ease;}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}

  /* Results */
  .results-card{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    padding:28px 32px;margin-bottom:16px;
  }
  .results-card h2{text-align:center;margin-bottom:6px;}
  .final-score{text-align:center;font-size:2.8rem;font-weight:800;margin:10px 0;
    background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .final-sub{text-align:center;color:var(--muted);margin-bottom:20px;}
  .review-item{
    padding:12px 16px;background:var(--card2);border-radius:8px;margin-bottom:8px;
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;
  }
  .review-item .ri-name{font-weight:600;}
  .review-item .ri-answer{color:var(--muted);font-size:.88rem;}
  .review-item .ri-pts{font-weight:700;white-space:nowrap;}
  .ri-pts.good{color:var(--green)}.ri-pts.ok{color:orange}.ri-pts.bad{color:var(--red)}
  .stars{text-align:center;font-size:1.5rem;margin-bottom:14px;}

  /* Start screen */
  .start-screen{text-align:center;padding:40px 20px;}
  .start-screen p{color:var(--muted);max-width:500px;margin:14px auto;}
  .start-icon{font-size:4rem;margin-bottom:10px;}
  .rules{text-align:left;background:var(--card2);border-radius:8px;padding:16px 20px;margin:18px 0;font-size:.9rem;color:var(--muted);}
  .rules li{margin-bottom:4px;list-style:disc inside;}

  /* Responsive */
  @media(max-width:500px){
    body{padding:12px;}
    .case-card,.results-card{padding:18px 16px;}
    .answer-area{flex-direction:column;}
    .score-badge{position:static;margin-bottom:12px;text-align:center;}
  }
</style>
</head>

// ---- AUDIO ----
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq, dur, type='sine', vol=.12){
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.value = vol;
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + dur);
  o.stop(audioCtx.currentTime + dur);
}
function soundCorrect(){ playTone(523,.08); setTimeout(()=>playTone(659,.08),90); setTimeout(()=>playTone(784,.15),180); }
function soundWrong(){ playTone(200,.25,'sawtooth',.08); }

// ---- CONFETTI ----
function spawnConfetti(n=30){
  const colors=['#6c63ff','#ff6584','#2ecc71','#f1c40f','#3498db','#e67e22'];
  for(let i=0;i<n;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.left=Math.random()*100+'vw';
    el.style.top='-10px';
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDelay=Math.random()*.5+'s';
    el.style.animationDuration=(.8+Math.random()*.8)+'s';
    el.style.transform='rotate('+Math.random()*360+'deg)';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2000);
  }
}

function shuffle(arr){
  const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a;
}

}

    </div>
    <div class="case-card" id="caseCard">
      <div class="patient-header">
        <div class="patient-icon">${c.icon}</div>
        <div>
          <div class="patient-name">${c.name}, ${c.age} ans</div>
          <div class="patient-desc">Patient(e) en consultation</div>
        </div>
      </div>
      <ul class="clues-list" id="cluesList">
        ${cluesHTML}
      </ul>
      <div class="answer-area" id="answerArea">
        <select id="answerSelect">
          <option value="">-- Choisir un trouble --</option>
          ${optionsHTML}
        </select>
      </div>
      <div class="btn-row" id="btnRow">
        <button class="btn btn-secondary" id="btnClue" onclick="nextClue()">Indice suivant \u{27A1}</button>
        <button class="btn btn-primary" id="btnSubmit" onclick="submitAnswer()">Valider \u2705</button>
      </div>
      <div id="feedback"></div>
    </div>
  `;
}

function nextClue(){
  if(answered) return;
  const ci = caseOrder[currentCase];
  const c = CASES[ci];
  currentClue++;
  if(currentClue >= c.clues.length) return;

  const list = document.getElementById('cluesList');
  const li = document.createElement('li');
  li.className = 'clue-item';
  li.innerHTML = `<span class="num">#${currentClue+1}</span>${c.clues[currentClue]}`;
  list.appendChild(li);

  if(currentClue >= c.clues.length - 1){
    document.getElementById('btnClue').disabled = true;
    document.getElementById('btnClue').textContent = 'Tous les indices reveles';
  }
}

function normalize(s){
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');
}

function submitAnswer(){
  if(answered) return;
  const ci = caseOrder[currentCase];
  const c = CASES[ci];
  const sel = document.getElementById('answerSelect').value;
  const guess = sel;

  if(!guess){
    document.getElementById('caseCard').classList.add('shake');
    setTimeout(()=>document.getElementById('caseCard').classList.remove('shake'),500);
    return;
  }

  answered = true;
  const normGuess = normalize(guess);
  const normAnswer = normalize(c.display);
  const normAnswer2 = normalize(c.answer);

  const correct = normGuess === normAnswer || normGuess === normAnswer2 ||
    normAnswer.includes(normGuess) || normGuess.includes(normAnswer);

  const pts = correct ? Math.max(1, 5 - currentClue) : 0;
  score += pts;

  results.push({
    name: c.name,
    age: c.age,
    display: c.display,
    guess: guess,
    correct: correct,
    cluesUsed: currentClue + 1,
    points: pts
  });

  const fb = document.getElementById('feedback');
  if(correct){
    soundCorrect();
    spawnConfetti();
    fb.className = 'feedback correct';
    fb.innerHTML = `\u2705 Correct ! <strong>${c.display}</strong> &mdash; +${pts} point${pts>1?'s':''}`;
  } else {
    soundWrong();
    document.getElementById('caseCard').classList.add('shake');
    setTimeout(()=>document.getElementById('caseCard').classList.remove('shake'),500);
    fb.className = 'feedback wrong';
    fb.innerHTML = `\u274C Incorrect. La reponse etait : <strong>${c.display}</strong>`;
  }

  // Show all remaining clues
  const list = document.getElementById('cluesList');
  for(let i = currentClue + 1; i < c.clues.length; i++){
    const li = document.createElement('li');
    li.className = 'clue-item';
    li.style.opacity = '.5';
    li.innerHTML = `<span class="num">#${i+1}</span>${c.clues[i]}`;
    list.appendChild(li);
  }

  document.getElementById('btnClue').style.display = 'none';
  document.getElementById('btnSubmit').style.display = 'none';
  document.getElementById('answerArea').style.display = 'none';

  const btnRow = document.getElementById('btnRow');
  if(currentCase < CASES.length - 1){
    btnRow.innerHTML = `<button class="btn btn-primary" onclick="nextCase()" style="width:100%">Cas suivant \u27A1</button>`;
  } else {
    btnRow.innerHTML = `<button class="btn btn-success" onclick="showResults()" style="width:100%">Voir les resultats \u{1F3C6}</button>`;
  }
  document.getElementById('scoreVal').textContent = score;
}

function nextCase(){
  currentCase++;
  renderCase();
}

function showResults(){
  const maxScore = CASES.length * 5;
  const pct = Math.round(score / maxScore * 100);
  let stars = '';
  if(pct >= 90) stars = '\u2B50\u2B50\u2B50\u2B50\u2B50';
  else if(pct >= 75) stars = '\u2B50\u2B50\u2B50\u2B50';
  else if(pct >= 60) stars = '\u2B50\u2B50\u2B50';
  else if(pct >= 40) stars = '\u2B50\u2B50';
  else stars = '\u2B50';

  let msg = '';
  if(pct >= 90) msg = 'Excellent ! Vous maitrisez la psychopathologie !';
  else if(pct >= 75) msg = 'Tres bien ! Quelques revisions et ce sera parfait.';
  else if(pct >= 60) msg = 'Bien ! Continuez vos efforts.';
  else if(pct >= 40) msg = 'Peut mieux faire. Relisez vos cours !';
  else msg = 'Il est temps de reviser serieusement !';

  let reviewHTML = results.map(r => {
    const cls = r.points >= 4 ? 'good' : r.points >= 2 ? 'ok' : 'bad';
    const icon = r.correct ? '\u2705' : '\u274C';
    return `<div class="review-item">
      <div>
        <span class="ri-name">${icon} ${r.name}, ${r.age} ans</span><br>
        <span class="ri-answer">${r.display}${!r.correct ? ' (vous : '+r.guess+')' : ''}</span>
      </div>
      <div class="ri-pts ${cls}">${r.points}/5 (${r.cluesUsed} indice${r.cluesUsed>1?'s':''})</div>
    </div>`;
  }).join('');

  const correctCount = results.filter(r=>r.correct).length;

  app.innerHTML = `
    <div class="results-card">
      <h2>\u{1F3C6} Resultats</h2>
      <div class="stars">${stars}</div>
      <div class="final-score">${score} / ${maxScore}</div>
      <div class="final-sub">${pct}% &mdash; ${correctCount}/${CASES.length} corrects &mdash; ${msg}</div>
      ${reviewHTML}
      <div class="btn-row" style="justify-content:center;margin-top:20px;">
        <button class="btn btn-primary" onclick="startGame()">\u{1F504} Rejouer</button>
        <button class="btn btn-secondary" onclick="renderStart()">\u{1F3E0} Accueil</button>
      </div>
    </div>
  `;

  if(pct >= 75) spawnConfetti(50);
}

// ---- INIT ----
renderStart();
</script>
</body>
</html>
